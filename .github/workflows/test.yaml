name: Test

on:
  pull_request:
    branches: [master]

permissions:
  id-token: write
  contents: read

run-name: Test ${{ github.head_ref }} (${{ github.sha }})

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build and run tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        id: build
        uses: Rhodri-Morgan/github-workflows/build@v2
        with:
          image-repo: sport-data-discord-bot
          aws-region: eu-west-1
          account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          role-arn: ${{ secrets.AWS_ROLE_ARN }}

      - name: Run tests
        run: docker run --rm local/sport-data-discord-bot:${{ steps.build.outputs.image-tag }} make ci-test
